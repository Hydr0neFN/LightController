; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nologo_esp32c3_super_mini]
; pioarduino fork: official PlatformIO espressif32 is frozen at arduino-esp32
; core 2.0.17, but HomeSpan 2.1.0 requires core >= 3.3.0. This release bundles
; arduino-esp32 3.3.9 (ESP-IDF 5.5.4) and ships the nologo board natively.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = nologo_esp32c3_super_mini
framework = arduino
monitor_speed = 115200

; Default partition app slot (~1.31MB) is too small for HomeSpan+WiFi+OTA.
; min_spiffs gives ~1.9MB per app slot and keeps two OTA slots.
board_build.partitions = min_spiffs.csv

; ESP32-C3 Super Mini exposes its serial console over native USB-CDC.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

upload_speed = 921600

lib_deps =
    homespan/HomeSpan@^2.1.0
    knolleary/PubSubClient@^2.8
